apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio-image-svc
spec:
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: webui
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - /bin/bash
            - -c
          args:
            - minio server /storage --console-address :9001
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                configMapKeyRef:
                  name:  minio-image-config-map
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-image-secret
                  key: minio-secret-key
            - name: MINIO_DEFAULT_BUCKETS
              valueFrom:
                configMapKeyRef:
                  name:  minio-image-config-map
                  key: minio-bucket-name
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: minio-storage
              mountPath: /storage
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc