# Default values for image-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: image-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

service:
  type: ClusterIP
  port: 80

env:
  dbServer: mayart-mysql
  dbName: user_service_db
  dbUsername: root
  dbPassword: MTIzNDU2Nzg=       ## rootpassword (12345678 in base64)
  dbRootPassword: MTIzNDU2Nzg=   ## userpassword  (12345678 in base64)
  minioAccessKey: mykey
  minioHost: image-service-minio
  minioSecretKey: MTIzNDU2Nzg=       ## minio secret key  (12345678 in base64)

db:
  name: postgres
  image: postgres:16.3
  
  service:
    port: 5432

  volumeMounts:
    - name: postgre-persistent-storage
      mountPath: /data/db
  
  volumes:
    - name: postgre-persistent-storage
      persistentVolumeClaim:
        claimName: postgre-pvc

  pvc:
    accessModes: ReadWriteOnce
    storage: 1Gi

minio:
  name: minio
  image: minio/minio:RELEASE.2024-06-29T01-20-47Z
  
  service:
    port: 9000

  volumeMounts:
    - name: minio-storage
      mountPath: /storage

  volumes:
    - name: minio-storage
      persistentVolumeClaim:
        claimName: minio-pvc

  pvc:
    accessModes: ReadWriteOnce
    storage: 1Gi

# -----------
# Not used settings
# -----------

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
