apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-service.fullname" . }}-{{ .Values.db.name }}
  labels:
    {{- include "image-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.db.service.type }}
  ports:
    - port: {{ .Values.db.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "image-service.selectorLabels" . | nindent 4 }}
