apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-service.fullname" . }}
  labels:
    {{- include "image-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "image-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "image-service.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "image-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: DB_SERVER
              valueFrom:
                configMapKeyRef:
                  name:  {{ include "image-service.fullname" . }}-config-map
                  key: postgresql-server
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name:  {{ include "image-service.fullname" . }}-config-map
                  key: postgresql-database-name
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "image-service.fullname" . }}-config-map
                  key: postgresql-user-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "image-service.fullname" . }}-secret
                  key: postgresql-user-password
            - name: MINIO_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "image-service.fullname" . }}-config-map
                  key: minio-host
            - name: MINIO_ACCESS_KEY
              valueFrom:
                configMapKeyRef:
                  name:  {{ include "image-service.fullname" . }}-config-map
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "image-service.fullname" . }}-secret
                  key: minio-secret-key
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
