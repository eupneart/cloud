
name: Helm Chart Linting and Template Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.17.2'

      - name: Lint Helm charts
        run: |
          for chart in ./applications/*
          do
            echo "Checking linting for $chart"
            helm lint $chart
          done


      - name: Check Helm templates
        run: |
          for chart in ./applications/*
          do
            echo "Checking templates for $chart"
            helm template $chart
          done
