app:
  applicationName: api-gateway
  namespaceOverride: ""
  labels:
    group: com.eupneart
    team: eupneart
    component: api-gateway
    phase: dev
  deployment:
    image:
      repository: "eupneart/api-gateway"
      tag: "latest"
      pullPolicy: "Always"
    replicas: 1
    envFrom:
      app-cm:
        type: configmap
        nameSuffix: app-cm
      app-secret:
        type: secret
        nameSuffix: app-secret
    ports:
    - containerPort: 80
      name: http
      protocol: TCP
    containerSecurityContext:
      runAsUser: 999
    readinessProbe:
      enabled: true
      httpGet:
        path: /actuator/health/readiness
        port: 80

  service:
    enabled: true
    type: NodePort
    ports:
      - port: 80
        targetPort: 80

  configMap:
    enabled: true
    files:
      app-cm:
        GATEWAY_PORT: "80"
        LOG_LEVEL: "DEBUG"
  
  secret:
    enabled: true
    files:
      app-secret:
        data:
          JWT_SECRET: "MWQzMTQ5NWIxN2FmMDA5NmRmNzk3ZWQ0NzQ0OTBmNTg"